<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surgical Robo Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
}

/* LEFT SIDE (NOW LIGHT BACKGROUND) */
.left {
    width: 50%;
    background: linear-gradient(to bottom right, #f8fafc, #e2e8f0);
    color: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* LOGO BOX */
.logo-box {
    background: rgba(15, 118, 110, 0.08);
    padding: 25px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 20px;
}

/* LOGO IMAGE */
.logo-box img {
    width: 120px;
}

/* TEXT */
.left h1 {
    font-size: 36px;
    margin-bottom: 10px;
    color: #0f172a;
}

.subtitle {
    color: #475569;
    font-size: 18px;
}

/* RIGHT SIDE (NOW GRADIENT DARK) */
.right {
    width: 50%;
    background: radial-gradient(circle at center, #1abc9c, #0f766e 60%, #062f2f);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    width: 360px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.card h2 {
    margin-bottom: 10px;
    color: #0f172a;
}

.card p {
    color: #475569;
    font-size: 14px;
    margin-bottom: 20px;
}

/* INPUT */
label {
    font-weight: 600;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #e5e7eb;
    margin: 10px 0 20px;
}

input:focus {
    outline: none;
    box-shadow: 0 0 0 2px #1abc9c;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #1abc9c, #0f766e);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #64748b;
    text-align: center;
}
</style>
<script type="module" src="login.js"></script>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
    <div class="left-content">
        <div class="logo-box">
            <!-- Replace with your real logo -->
            <img src="media/DoMoreLogo.png" alt="Logo">
        </div>

        <h1>WELCOME TO<br>SURGICAL ROBO</h1>
        <p class="subtitle">Advanced Surgical Automation System</p>
    </div>
</div>

<!-- RIGHT SIDE -->
<div class="right">
    <div class="card">
        <h2>Login</h2>
        <p>Please verify your credentials to proceed.</p>

        <label>Email Address</label>
        <input id="email" type="email" placeholder="Enter your email">
        <p id="error-msg" style="color:red; font-size:13px; display:none;"></p>

        <button onclick="sendLink()">Send Mail →</button>

        <div class="footer">
            © 2026 Surgical Robo
        </div>
    </div>
</div>

</body>
</html>
